name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --retries 10 --timeout 120 pyinstaller pandas openpyxl python-calamine

    - name: Build balance EXE
      run: |
        pyinstaller --onefile --name "balance-merge" "Python/余额汇总/一键合并余额汇总.py"

    - name: Build consumption EXE
      run: |
        pyinstaller --onefile --name "consumption-merge" "Python/消耗汇总/总消耗汇总.py"

    - name: Build create directory EXE
      run: |
        pyinstaller --onefile --name "create-directory" "Python/创建日期目录.py"

    - name: Rename exe files
      run: |
        Rename-Item -Path "dist/balance-merge.exe" -NewName "一键合并余额汇总.exe"
        Rename-Item -Path "dist/consumption-merge.exe" -NewName "一键合并消耗汇总.exe"
        Rename-Item -Path "dist/create-directory.exe" -NewName "一键创建日期目录.exe"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/一键合并余额汇总.exe
          dist/一键合并消耗汇总.exe
          dist/一键创建日期目录.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
