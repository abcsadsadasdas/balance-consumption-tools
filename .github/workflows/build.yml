name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --retries 10 --timeout 120 pyinstaller pandas openpyxl python-calamine

    - name: Build balance EXE
      run: |
        pyinstaller --onefile --name "balance-merge" "Python\余额汇总\一键合并余额汇总.py"

    - name: Build consumption EXE
      run: |
        pyinstaller --onefile --name "consumption-merge" "Python\消耗汇总\总消耗汇总.py"

    - name: Build all-consumption EXE
      run: |
        pyinstaller --onefile --name "all-consumption" `
          --hidden-import pandas `
          --hidden-import openpyxl `
          --hidden-import calamine `
          --hidden-import 快手消耗处理 `
          --hidden-import 金牛消耗处理 `
          --hidden-import 抖音千川消耗处理 `
          --hidden-import 陵致长风消耗处理 `
          --hidden-import 广点通ADQ_消耗处理 `
          --hidden-import 支付宝消耗处理 `
          --hidden-import B站消耗处理 `
          --add-data "Python\消耗汇总\回填数据导入模板_快手.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_头条.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_广点通.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_广点通 copy.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_支付宝.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_B站-信息流.xlsx;." `
          --add-data "Python\消耗汇总\回填数据导入模板_其他.xlsx;." `
          "Python\消耗汇总\一键运行全部消耗.py"

    - name: Build create directory EXE
      run: |
        pyinstaller --onefile --name "create-directory" "Python\创建日期目录.py"

    - name: Copy template files
      run: |
        Copy-Item -Path "Python\余额汇总\模板\余额导入模板.xlsx" -Destination "dist\余额导入模板.xlsx"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_快手.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_头条.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_广点通.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_广点通 copy.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_支付宝.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_B站-信息流.xlsx" -Destination "dist\"
        Copy-Item -Path "Python\消耗汇总\回填数据导入模板_其他.xlsx" -Destination "dist\"

    - name: List dist files
      run: |
        dir dist\

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/balance-merge.exe
          dist/consumption-merge.exe
          dist/all-consumption.exe
          dist/create-directory.exe
          dist/余额导入模板.xlsx
          dist/回填数据导入模板_快手.xlsx
          dist/回填数据导入模板_头条.xlsx
          dist/回填数据导入模板_广点通.xlsx
          dist/回填数据导入模板_广点通 copy.xlsx
          dist/回填数据导入模板_支付宝.xlsx
          dist/回填数据导入模板_B站-信息流.xlsx
          dist/回填数据导入模板_其他.xlsx
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
